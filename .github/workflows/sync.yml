name: Sync from upstream

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - run: |
          git remote add upstream https://github.com/MaisAttivo/client-coach-pro.git
          git fetch upstream
          git merge upstream/main --no-edit
          git push
